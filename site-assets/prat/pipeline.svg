<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PRAT differential coverage pipeline</title>
  <desc id="desc">A diagram showing PRAT compiling a project with a feature on and off, collecting coverage, diffing results, and generating reports.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2F7"/>
    </linearGradient>
    <linearGradient id="feature" x1="70" y1="78" x2="1130" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#1F2937" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="24" fill="url(#bg)"/>
  <text x="60" y="62" fill="#111827" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="700">PRAT Differential Coverage Pipeline</text>
  <text x="60" y="92" fill="#4B5563" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">Compare feature-on and feature-off executions to locate source lines tied to a feature.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="135" width="150" height="90" rx="12" fill="#FFFFFF" stroke="#D7DEE8"/>
    <text x="135" y="167" text-anchor="middle" fill="#111827" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700">Feature</text>
    <text x="135" y="193" text-anchor="middle" fill="#4B5563" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13">Example: TLS</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="270" y="120" width="170" height="80" rx="12" fill="#FFFFFF" stroke="#BFDBFE"/>
    <text x="355" y="151" text-anchor="middle" fill="#1E3A8A" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700">Compile ON</text>
    <text x="355" y="176" text-anchor="middle" fill="#4B5563" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12">instrumented build</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="270" y="230" width="170" height="80" rx="12" fill="#FFFFFF" stroke="#CCFBF1"/>
    <text x="355" y="261" text-anchor="middle" fill="#115E59" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700">Compile OFF</text>
    <text x="355" y="286" text-anchor="middle" fill="#4B5563" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12">instrumented build</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="500" y="120" width="170" height="80" rx="12" fill="#FFFFFF" stroke="#BFDBFE"/>
    <text x="585" y="151" text-anchor="middle" fill="#1E3A8A" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700">Run Workload</text>
    <text x="585" y="176" text-anchor="middle" fill="#4B5563" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12">feature enabled</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="500" y="230" width="170" height="80" rx="12" fill="#FFFFFF" stroke="#CCFBF1"/>
    <text x="585" y="261" text-anchor="middle" fill="#115E59" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700">Run Workload</text>
    <text x="585" y="286" text-anchor="middle" fill="#4B5563" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12">feature disabled</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="730" y="120" width="165" height="80" rx="12" fill="#FFFFFF" stroke="#BFDBFE"/>
    <text x="812.5" y="151" text-anchor="middle" fill="#1E3A8A" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700">Coverage ON</text>
    <text x="812.5" y="176" text-anchor="middle" fill="#4B5563" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12">gcov files</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="730" y="230" width="165" height="80" rx="12" fill="#FFFFFF" stroke="#CCFBF1"/>
    <text x="812.5" y="261" text-anchor="middle" fill="#115E59" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700">Coverage OFF</text>
    <text x="812.5" y="286" text-anchor="middle" fill="#4B5563" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12">gcov files</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="955" y="175" width="180" height="96" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="1045" y="207" text-anchor="middle" fill="#111827" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700">Diff + Extract</text>
    <text x="1045" y="232" text-anchor="middle" fill="#4B5563" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12">HTML, JSON, DOT</text>
    <text x="1045" y="252" text-anchor="middle" fill="#4B5563" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12">feature-specific lines</text>
  </g>

  <path d="M210 180 H270" stroke="url(#feature)" stroke-width="3" stroke-linecap="round"/>
  <path d="M210 180 C235 180 235 270 270 270" stroke="url(#feature)" stroke-width="3" stroke-linecap="round"/>
  <path d="M440 160 H500" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
  <path d="M440 270 H500" stroke="#0F766E" stroke-width="3" stroke-linecap="round"/>
  <path d="M670 160 H730" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
  <path d="M670 270 H730" stroke="#0F766E" stroke-width="3" stroke-linecap="round"/>
  <path d="M895 160 C925 160 925 223 955 223" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
  <path d="M895 270 C925 270 925 223 955 223" stroke="#0F766E" stroke-width="3" stroke-linecap="round"/>

  <g>
    <rect x="60" y="345" width="1080" height="44" rx="12" fill="#FFFFFF" stroke="#D7DEE8"/>
    <text x="86" y="372" fill="#111827" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="700">Demo result:</text>
    <text x="184" y="372" fill="#374151" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14">Mosquitto TLS smoke run identified 1,743 removable lines across 18 files and generated static HTML, JSON, and DOT reports.</text>
  </g>
</svg>
