name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -v --tb=short
      - run: pytest --co -q | tail -1  # print test count

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Mosquitto TLS demo image
        run: |
          # Fetch target (shallow clone for CI)
          ./scripts/fetch-targets.sh mosquitto
          docker build -f docker/demo1/Dockerfile -t prat-demo:mosquitto-tls .
      - name: Build KLEE image
        run: docker build -f docker/klee/Dockerfile -t prat-klee .
